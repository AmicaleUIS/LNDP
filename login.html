<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Connexion — Le Nid des Pronos</title>
  <meta name="theme-color" content="#07111f">
  <link rel="manifest" href="manifest.json?v=0.24.1">
  <link rel="icon" href="assets/icons/icon-192.png">
  <link rel="stylesheet" href="css/style.css?v=0.24.1">
</head>
<body class="auth-layout">
  <main class="auth-card">
    <div class="brand-lockup">
      <img src="assets/icons/icon-192.png" alt="Icône Le Nid des Pronos">
      <div>
        <h1>Le Nid des Pronos</h1>
        <p>Connexion au nid.</p>
      </div>
    </div>

    <h2>Connexion</h2>
    <p class="muted">Entre ton email et ton mot de passe.</p>

    <form id="loginForm" class="form-stack">
      <label>
        <span>Email</span>
        <input type="email" name="email" autocomplete="email" required>
      </label>
      <label>
        <span>Mot de passe</span>
        <input type="password" name="password" autocomplete="current-password" required>
      </label>
      <button class="primary-btn" type="submit">Entrer dans le nid</button>
    </form>

    <p class="auth-switch">Pas encore de compte ? <a href="register.html">Créer un compte</a></p>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js?v=0.24.1"></script>
  <script src="js/supabaseClient.js?v=0.24.1"></script>
  <script src="js/auth.js?v=0.24.1"></script>
  <script src="js/common.js?v=0.24.1"></script>
  <script>
    window.addEventListener('DOMContentLoaded', async () => {
      await Auth.redirectIfLoggedIn();
      document.querySelector('#loginForm').addEventListener('submit', async (event) => {
        event.preventDefault();
        const formData = new FormData(event.currentTarget);
        try {
          await Auth.login(formData.get('email'), formData.get('password'));
          window.location.href = 'app.html';
        } catch (error) {
          Helpers.toast(error.message || 'Connexion impossible', 'error');
        }
      });
    });
  </script>
</body>
</html>
